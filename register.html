        const { createClient } = supabase;

<body>

<div class="container">

    <div class="logo">
        <img src="neulogo.png" alt="NEU Logo" class="logo-img">
        <div class="logo-text">
            <h3>New Era University</h3>
            <p>NEU Library Registration</p>
        </div>
    </div>

    <form id="registerForm">

        <div class="input">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="Kaeslyn Klein Silfante" required>
        </div>

        <div class="input">
            <label for="email">Institutional Email</label>
            <input type="email" id="email" placeholder="name@neu.edu.ph" required>
        </div>


        <div class="input">
            <label for="Student/Facult">User Type</label>
            <div class="select-type">
                <select id="userType" required>
                    <option value="" disabled selected>I am a/an</option>
                    <option value="student">Student</option>
                    <option value="faculty">Faculty</option>
                    <option value="employee">Employee</option>
                </select>
            </div>
        </div>

        <div class="input">
            <label for="college">College / Program</label>
            <div class="select-type">
                <select id="college" required>
                    <option value="" disabled selected>Select College / Program</option>

                    <optgroup label="── Graduate Programs ──">
                        <option value="gr-school">Master of Business Administration (MBA)</option>
                        <option value="s-law">Master of Education (M.Ed.)</option>
                    </optgroup>

                    <optgroup label="── Other Programs ──">
                        <option value="eteeap">ETEEAP (Expanded Tertiary Education Equivalency)</option>
                        <option value="tesda">Alternative Learning System</option>
                        <option value="cir">College of International Relations</option>
                    </optgroup>

                    <optgroup label="── Basic Education ──">
                        <option value="intr">Integrated School</option>
                    </optgroup>

                    <optgroup label="── Undergraduate Colleges ──">
                        <option value="ca">College of Accountancy</option>
                        <option value="cas">College of Arts and Sciences</option>
                        <option value="cag">College of Agriculture</option>
                        <option value="cba">College of Business Administration</option>
                        <option value="ccom">College of Communication</option>
                        <option value="ccrim">College of Criminology</option>
                        <option value="ced">College of Education</option>
                        <option value="cea">College of Engineering and Architecture</option>
                        <option value="ced">College of Informatics and Computer Studies</option>
                        <option value="cm">College of Medicine</option>
                        <option value="cmt">College of Medical Technology</option>
                        <option value="cmid">College of Midwifery</option>
                        <option value="cmus">College of Music</option>
                        <option value="cn">College of Nursing</option>
                        <option value="cpt">College of Physical Therapy</option>
                        <option value="crt">College of Respiratory Therapy</option>
                    </optgroup>
                </select>
            </div>
        </div>

        <div class="input">
            <label for="password">Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter your password" required>
                <span class="toggle-password" onclick="togglePassword()"></span>
            </div>
        </div>

        <div class="input">
            <label for="confirmPassword">Confirm Password</label>
            <div class="password-wrapper">
                <input type="password" id="confirmPassword" placeholder="Re-enter your password" required>
                <span class="toggle-password" onclick="toggleConfirmPassword()"></span>
            </div>
        </div>

        <div class="terms-wrapper">
            <input type="checkbox" id="agreeTerms" required>
            <label for="agreeTerms">
                I agree to the <a href="terms.html" target="_blank">Terms &amp; Conditions</a> and <a href="privacy.html" target="_blank">Privacy Policy</a>
            </label>
        </div>

        <button type="submit" id="registerBtn">Register</button>
    </form>

    <div class="divider"></div>
    <p class="have-account">
        Already have an account? <a href="login.html">Login here</a>
    </p>

    <p id="message"></p>
</div>

<script src="register.js"></script>

</body>
</html>
